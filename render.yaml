services:
  # Backend API Service
  - type: web
    name: domainscope-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci && echo "=== Running DB migration ===" && npm run migrate && echo "=== Cleaning Prisma client ===" && rm -rf node_modules/.prisma node_modules/@prisma/client && echo "=== Generating Prisma client ===" && npx prisma generate && echo "=== Building TypeScript ===" && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: VT_API_KEY
        sync: false
    autoDeploy: true
